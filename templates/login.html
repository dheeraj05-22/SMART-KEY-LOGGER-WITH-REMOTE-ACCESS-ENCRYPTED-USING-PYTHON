<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }

        .lock {
            color: darkred;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    {% if lock_remaining is defined and lock_remaining > 0 %}
    <div class="lock">
        Account locked. Try again in
        <span id="countdown" data-seconds="{{ lock_remaining }}"></span>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const countdownEl = document.getElementById("countdown");
        let seconds = parseInt(countdownEl.getAttribute("data-seconds"));

        const timer = setInterval(function () {
            seconds--;

            if (seconds <= 0) {
                clearInterval(timer);
                location.reload();
            } else {
                countdownEl.innerText = seconds;
            }

        }, 1000);
    });
    </script>
{% endif %}

</div>

</body>
</html>
